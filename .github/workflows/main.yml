name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WindowsScreenRecorder/WindowsScreenRecorder.csproj

      - name: Publish single-file EXE
        run: dotnet publish src/WindowsScreenRecorder/WindowsScreenRecorder.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsScreenRecorder-exe
          path: publish/WindowsScreenRecorder.exe
          retention-days: 30
